<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
</head>
<body>

<div th:switch="${users}">
    <!-- Cas où la liste est vide -->
    <h2 th:case="null">No users yet!</h2>

    <!-- Cas où il y a des utilisateurs -->
    <div th:case="*">
        <h2>Users List</h2>
        <table border="1">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.name}"></td> <!-- Utilise 'name' comme dans ton entité -->
                <td th:text="${user.email}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${user.id})}">Edit</a>
                    |
                    <a th:href="@{/delete/{id}(id=${user.id})}">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<p>
    <a th:href="@{/signup}">Add a new user</a>
</p>

</body>
</html>
